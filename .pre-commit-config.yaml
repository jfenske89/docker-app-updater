# Pre-commit configuration
# https://pre-commit.com
#
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w .
        language: system
        types: [go]
        pass_filenames: false

      - id: go-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev=HEAD~1
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: gitleaks
        name: gitleaks
        entry: gitleaks protect --verbose --staged
        language: system
        pass_filenames: false
